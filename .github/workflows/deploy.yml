name: Deploy to AWS EC2 using Docker

on:
  push:
    branches:
      - develop

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DEV_DOCKER_IMAGE_NAME }}
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_SSH_USER: ec2-user
  PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
  CONTAINER_NAME: ${{ secrets.DEV_CONTAINER_NAME }}

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up configuration files
      run: |
        echo "${{ secrets.DEV_APPLICATION }}" > ./src/main/resources/application-dev.yml
        echo "${{ secrets.DEV_APPLICATION_DATASOURCE }}" > ./src/main/resources/application-datasource.yml
        echo "${{ secrets.DEV_APPLICATION_REDIS }}" > ./src/main/resources/application-redis.yml
        echo "${{ secrets.DEV_APPLICATION_SECURITY }}" > ./src/main/resources/application-security.yml
        echo "${{ secrets.APPLICATION_CLOUD_YML }}" > ./src/main/resources/application-cloud.yml
        echo "${{ secrets.DEV_APPLICATION_YML }}" > ./src/main/resources/application.yml

    - name: Build with Gradle
      run: ./gradlew build -x test

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ${{ env.DOCKER_IMAGE_NAME }}

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Push the Docker image
      run: docker push ${{ env.DOCKER_IMAGE_NAME }}

  deploy-to-ec2:
    needs: build-and-push-docker
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.3
      with:
        host: ${{ env.EC2_HOST }}
        username: ${{ env.EC2_SSH_USER }}
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script: |
          echo "🚀 Stopping and removing existing container..."
          EXISTING=$(sudo docker ps -aq --filter "name=${{ env.CONTAINER_NAME }}")
          if [ ! -z "$EXISTING" ]; then
            sudo docker rm -f $EXISTING
          fi

          echo "📦 Pulling the latest Docker image..."
          sudo docker pull ${{ env.DOCKER_IMAGE_NAME }}

          echo "🚀 Running the new container with profile 'dev'..."
          sudo docker run --pull always --name ${{ env.CONTAINER_NAME }} -d \
            -p 8089:8089 \
            -e TZ=Asia/Seoul \
            -e SPRING_PROFILES_ACTIVE=dev \
            ${{ env.DOCKER_IMAGE_NAME }}

          echo "🧹 Cleaning up unused Docker resources..."
          sudo docker system prune -f

          echo "✅ Deployment completed successfully!"
